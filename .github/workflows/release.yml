name: Release Anorha Tray (DMG)

# Adapted from snip-desktop's proven pipeline. Two paths:
#   • branch / PR pushes → unsigned smoke build (artifact only), proves it still
#     compiles + packages.
#   • a `v<version>` tag → the signed `release` job: builds both arches in one
#     shot, SIGNS + NOTARIZES, and publishes the DMG + zip + latest-mac.yml
#     auto-update feed to a GitHub Release marked latest.
#
# Reuses the SAME Apple secrets you already set on the snip repo (same Apple
# Developer account / Team ID). Add these repo secrets here too:
#   MACOS_CERTIFICATE            base64 of your Developer ID Application .p12
#   MACOS_CERTIFICATE_PASSWORD   the .p12 export password
#   APPLE_ID                     your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password for notarytool
#   APPLE_TEAM_ID                5TD6S2T34N

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke build (unsigned)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build + package unsigned (arm64)
        run: |
          npx electron-vite build
          CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac dmg --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: anorha-tray-smoke-arm64
          path: release/**/*.dmg
          if-no-files-found: error

  release:
    name: Release (signed + notarized + auto-update feed)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          pkg="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [[ "$pkg" != "$tag" ]]; then
            echo "::error::tag v$tag does not match package.json version $pkg — bump package.json and re-tag." >&2
            exit 1
          fi

      - name: Configure signing + notarization (reuses your snip Apple secrets)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Auto-update needs a fully signed + notarized build, so require every
          # secret up front rather than failing deep in the build.
          missing=""
          [[ -z "$MACOS_CERTIFICATE" ]] && missing+=" MACOS_CERTIFICATE"
          [[ -z "$MACOS_CERTIFICATE_PASSWORD" ]] && missing+=" MACOS_CERTIFICATE_PASSWORD"
          [[ -z "$APPLE_ID_SECRET" ]] && missing+=" APPLE_ID"
          [[ -z "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" ]] && missing+=" APPLE_APP_SPECIFIC_PASSWORD"
          [[ -z "$APPLE_TEAM_ID_SECRET" ]] && missing+=" APPLE_TEAM_ID"
          if [[ -n "$missing" ]]; then
            echo "::error::Signed build needs these secrets, which are missing:$missing"
            exit 1
          fi
          # Heredoc form so a line-wrapped base64 cert survives the env file.
          delim="EOF_$(openssl rand -hex 8)"
          {
            printf '%s<<%s\n%s\n%s\n' CSC_LINK "$delim" "$MACOS_CERTIFICATE" "$delim"
            printf '%s<<%s\n%s\n%s\n' CSC_KEY_PASSWORD "$delim" "$MACOS_CERTIFICATE_PASSWORD" "$delim"
            printf '%s<<%s\n%s\n%s\n' APPLE_ID "$delim" "$APPLE_ID_SECRET" "$delim"
            printf '%s<<%s\n%s\n%s\n' APPLE_APP_SPECIFIC_PASSWORD "$delim" "$APPLE_APP_SPECIFIC_PASSWORD_SECRET" "$delim"
            printf '%s<<%s\n%s\n%s\n' APPLE_TEAM_ID "$delim" "$APPLE_TEAM_ID_SECRET" "$delim"
          } >> "$GITHUB_ENV"

      - name: Build + publish (signed + notarized dmg + zip + latest-mac.yml)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Stable-named DMGs + promote release to latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          version="$(node -p "require('./package.json').version")"
          arm="release/Anorha-${version}-arm64.dmg"
          x64="release/Anorha-${version}-x64.dmg"
          if [[ ! -f "$arm" || ! -f "$x64" ]]; then
            echo "::error::expected DMGs not found"; ls -la release/ || true; exit 1
          fi
          # Version-less copies so the web Download button has a STABLE URL
          # (releases/latest/download/Anorha-arm64.dmg) across every release.
          cp "$arm" release/Anorha-arm64.dmg
          cp "$x64" release/Anorha-x64.dmg
          gh release upload "${GITHUB_REF_NAME}" release/Anorha-arm64.dmg release/Anorha-x64.dmg --clobber --repo "$GITHUB_REPOSITORY"
          # electron-builder publishes a draft; promote it so releases/latest
          # serves both the download and the electron-updater feed.
          gh release edit "${GITHUB_REF_NAME}" --draft=false --latest --repo "$GITHUB_REPOSITORY"
