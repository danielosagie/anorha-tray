# electron-builder config for the Anorha tray app.
# Build with: npm run dist:mac  /  npm run dist:win  (or dist:dir for an
# unsigned local smoke test). Signing/notarize creds come from env (see
# docs/PACKAGING.md). electron-vite emits to out/ first; this packages it.

appId: app.anorha.tray            # KEEP THIS STABLE FOREVER — macOS TCC grants
                                  # (Accessibility/Screen Recording) + auto-update
                                  # identity both key off it.
productName: Anorha
copyright: Copyright © 2026 Anorha

directories:
  buildResources: build
  output: release/${version}

# POSITIVE includes (not negations): everything the main/preload/renderer need is
# bundled into out/ by electron-vite, so we ship ONLY out/ + package.json + the
# tray assets. This definitively keeps ALL top-level source (src/, bench/, convex/,
# electron/, examples/, tests/) out of the signed asar — a negation-only list does
# NOT (electron-builder copies the whole project root otherwise). Production
# node_modules are included automatically regardless of this list; devDependencies
# (esbuild, electron, vite…) are auto-pruned.
files:
  - 'out/**'
  - 'package.json'
  - 'assets/**'
  - '!**/*.map'
  # esbuild ships a ~10MB Mach-O bundler binary used only at build time (vite /
  # convex codegen) — nothing references it at app runtime. Safe to drop.
  - '!node_modules/esbuild/**'
  - '!node_modules/@esbuild/**'
  # Neither the mac nor win build needs the Linux native binary (the libnut
  # packages declare os:[darwin,linux,win32], defeating auto-pruning). Excluded
  # globally here; the small cross-binary (mac ships win32 / win ships darwin) is
  # left in rather than using per-platform `files`, which breaks config merge.
  - '!node_modules/@nut-tree-fork/libnut-linux/**'

# Native modules can't run from inside the asar archive — unpack them, or the
# app works in dev and crashes only after packaging.
asarUnpack:
  - '**/*.node'
  - 'node_modules/@nut-tree-fork/**'
  - 'node_modules/node-mac-permissions/**'
npmRebuild: true

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip          # REQUIRED for electron-updater (latest-mac.yml points at the zip)
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true           # uses notarytool; creds via env (APPLE_API_KEY etc.)
  extendInfo:
    # Screen Recording is a TCC grant, but modern macOS needs this string or the
    # permission prompt is malformed and the app is killed on first capture.
    NSScreenCaptureUsageDescription: "Anorha reads the screen so it can see and act on what's shown while running your commands."
    # Menu-bar/tray app — no Dock icon.
    LSUIElement: true
    # NOTE: Accessibility (mouse control) needs NO entitlement and NO plist key —
    # it's a pure TCC toggle granted at runtime. App Sandbox stays OFF (we add no
    # com.apple.security.app-sandbox key) or AXIsProcessTrusted() is always false.

dmg:
  title: ${productName} ${version}

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  # Azure Trusted Signing (recommended, ~$10/mo) — uncomment + fill when ready.
  # publisherName MUST equal the cert CommonName exactly or auto-update rejects.
  # azureSignOptions:
  #   publisherName: "Anorha"
  #   endpoint: "https://eus.codesigning.azure.net/"
  #   codeSigningAccountName: "<your-account>"
  #   certificateProfileName: "<your-profile>"

nsis:
  oneClick: false
  perMachine: false        # per-user install: no UAC, friendlier to auto-update
  allowToChangeInstallationDirectory: true

# Auto-update feed + release target (same model as snip-desktop). The CI
# `release` job publishes the signed+notarized DMG/zip + latest-mac.yml here on
# a `v*` tag; electron-updater reads releases/latest. CONFIRM owner/repo once the
# GitHub repo exists.
publish:
  provider: github
  owner: danielosagie
  repo: anorha-tray
